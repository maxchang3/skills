name: Sync Raycast Docs
on:
  schedule:
    - cron: "0 0 */3 * *" # Every 3 days at midnight
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Sync Docs
        run: node raycast-extension/scripts/sync-docs.mjs
      - name: Commit changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add raycast-extension/references/
          if git diff --cached -- ':(exclude)raycast-extension/references/index.md' | grep -q .; then
            git commit -m "chore: sync raycast docs"
            git push
          elif git diff --cached -- raycast-extension/references/index.md | grep -v '^\-.*Last Synced' | grep -v '^\+.*Last Synced' | grep -q .; then
            git commit -m "chore: sync raycast docs"
            git push
          else
            git reset HEAD -- .
          fi
