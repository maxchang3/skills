name: Check Metadata Images

on:
  pull_request:
    paths:
      - "metadata/**.png"
      - "metadata/**.jpg"
      - "metadata/**.jpeg"
  push:
    branches: [main]
    paths:
      - "metadata/**.png"
      - "metadata/**.jpg"
      - "metadata/**.jpeg"

jobs:
  check-images:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          python-version: "3.11"

      - name: Download Raycast Image Checker
        run: curl -sSL -o check_raycast_images.py https://raw.githubusercontent.com/raycast/extensions/main/scripts/check_raycast_images.py

      - name: Check Images
        run: |
          shopt -s nullglob globstar
          IMAGES=(metadata/**/*.png metadata/**/*.jpg metadata/**/*.jpeg)

          if [ ${#IMAGES[@]} -gt 0 ]; then
            echo "Found ${#IMAGES[@]} images to check."
            uv run --with numpy --with pillow check_raycast_images.py "${IMAGES[@]}"
          else
            echo "No images to check."
          fi
